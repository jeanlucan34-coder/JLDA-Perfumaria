<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Vila da Serra — Retire sua Senha</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #00a99d; --teal-dark: #007f75; --teal-light: #e6f7f6;
  --gray: #9b9b9b; --gray-light: #f5f5f5; --white: #fff;
  --border: #dce9e8; --warning: #e8a000;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(160deg, #e6f7f6 0%, #f5f5f5 100%);
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* HEADER */
.header {
  background: white;
  border-bottom: 4px solid var(--teal);
  padding: 18px 24px;
  text-align: center;
  box-shadow: 0 2px 16px rgba(0,169,157,.12);
}

/* CENTRO */
.centro {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  gap: 28px;
}

/* Boas vindas */
.bv-box {
  text-align: center;
}
.bv-box h1 {
  font-size: 22px; font-weight: 900; color: var(--teal-dark);
  letter-spacing: 1px; margin-bottom: 6px;
}
.bv-box p { font-size: 14px; color: var(--gray); }

/* Botão */
.btn-pegar {
  width: 100%; max-width: 400px;
  padding: 24px;
  background: var(--teal); color: white; border: none;
  border-radius: 18px; font-family: 'Oswald', sans-serif;
  font-size: 28px; font-weight: 500; letter-spacing: 3px;
  cursor: pointer; transition: all .2s;
  box-shadow: 0 8px 32px rgba(0,169,157,.4);
}
.btn-pegar:hover { background: var(--teal-dark); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,169,157,.45); }
.btn-pegar:active { transform: translateY(0); }
.btn-pegar:disabled { background: var(--gray); cursor: not-allowed; transform: none; box-shadow: none; }

/* Card da senha */
.senha-card {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 100%; max-width: 400px;
  background: white;
  border: 3px solid var(--teal);
  border-radius: 24px;
  padding: 36px 28px;
  text-align: center;
  box-shadow: 0 12px 48px rgba(0,169,157,.2);
  animation: popIn .5s cubic-bezier(.34,1.56,.64,1);
}
.senha-card.show { display: flex; }
@keyframes popIn { from{transform:scale(.75);opacity:0} to{transform:scale(1);opacity:1} }

.sc-label {
  font-size: 11px; font-weight: 700; color: var(--gray);
  text-transform: uppercase; letter-spacing: 4px;
}
.sc-num {
  font-family: 'Oswald', sans-serif;
  font-size: 108px; color: var(--teal); font-weight: 700;
  line-height: 1; letter-spacing: 8px;
}
.sc-divider {
  width: 60px; height: 3px;
  background: linear-gradient(90deg, var(--teal), var(--teal-light));
  border-radius: 2px;
}
.sc-hora { font-size: 13px; color: var(--gray); font-weight: 500; }

.pos-tag {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--teal-light); color: var(--teal-dark);
  border: 1.5px solid var(--teal); border-radius: 30px;
  padding: 10px 28px; font-size: 15px; font-weight: 700;
  margin-top: 4px;
}
.pos-tag.alert {
  background: #fff3cd; color: #856404;
  border-color: var(--warning);
  animation: blink 1s infinite;
  font-size: 14px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.55} }

.sc-dica {
  font-size: 12px; color: var(--gray);
  text-align: center; max-width: 280px;
  line-height: 1.6;
}

/* Footer */
.footer {
  text-align: center; padding: 16px;
  font-size: 11px; color: var(--gray);
  font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase;
}

/* Loading */
.loading-dot {
  width: 48px; height: 48px;
  border: 4px solid var(--teal-light);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div class="header">
  <svg style="height:42px;display:block;margin:0 auto" viewBox="0 0 300 56" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="30" r="18" fill="none" stroke="#00a99d" stroke-width="7"/>
    <circle cx="38" cy="30" r="18" fill="none" stroke="#9b9b9b" stroke-width="7"/>
    <text x="66" y="18" font-family="Montserrat,sans-serif" font-size="10" font-weight="600" fill="#9b9b9b" letter-spacing="3">HOSPITAL</text>
    <text x="64" y="46" font-family="Montserrat,sans-serif" font-size="24" font-weight="900" fill="#00a99d" letter-spacing="1">VILA DA SERRA</text>
  </svg>
</div>

<div class="centro">

  <div id="loading" style="display:flex;flex-direction:column;align-items:center;gap:16px">
    <div class="loading-dot"></div>
    <span style="font-size:13px;color:var(--gray);font-weight:600">Conectando...</span>
  </div>

  <div id="conteudo" style="display:none;flex-direction:column;align-items:center;gap:28px;width:100%">

    <div class="bv-box">
      <h1>Bem-vindo!</h1>
      <p>Clique no botão abaixo para retirar sua senha de atendimento.</p>
    </div>

    <button class="btn-pegar" id="btn-pegar" onclick="gerarSenha()">
      🎫 RETIRAR SENHA
    </button>

    <div class="senha-card" id="senha-card">
      <div class="sc-label">Sua senha de atendimento</div>
      <div class="sc-num" id="sc-num">000</div>
      <div class="sc-divider"></div>
      <div class="sc-hora" id="sc-hora"></div>
      <div class="pos-tag" id="sc-pos">⏳ Verificando posição...</div>
      <div class="sc-dica">Aguarde seu número ser chamado no painel. Fique atento!</div>
    </div>

  </div>

</div>

<div class="footer">Hospital Vila da Serra &nbsp;·&nbsp; Sistema de Senhas</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue, push, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCY0DDSTeFkjaEwL6LE6iLt0JdKHwExVgs",
  authDomain: "fila-viladaserra.firebaseapp.com",
  databaseURL: "https://fila-viladaserra-default-rtdb.firebaseio.com",
  projectId: "fila-viladaserra",
  storageBucket: "fila-viladaserra.firebasestorage.app",
  messagingSenderId: "1064151600235",
  appId: "1:1064151600235:web:8ffd2ac2868a9943a6b52e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let minhaSenha = sessionStorage.getItem('minha_senha') ? parseInt(sessionStorage.getItem('minha_senha')) : null;
let minhaSenhaHora = sessionStorage.getItem('minha_senha_hora') || '';
let dados = {};

// Mostra conteúdo após conectar
setTimeout(() => {
  document.getElementById('loading').style.display = 'none';
  const c = document.getElementById('conteudo');
  c.style.display = 'flex';

  // Restaura senha da sessão
  if (minhaSenha) {
    document.getElementById('btn-pegar').disabled = true;
    document.getElementById('btn-pegar').textContent = '✅ Senha já retirada!';
    document.getElementById('sc-num').textContent = fmt(minhaSenha);
    document.getElementById('sc-hora').textContent = 'Emitida às ' + minhaSenhaHora;
    document.getElementById('senha-card').classList.add('show');
  }
}, 800);

// Listener tempo real
onValue(ref(db, '/'), (snap) => {
  dados = snap.val() || {};
  atualizarPosicao();
});

function atualizarPosicao() {
  if (!minhaSenha) return;
  const el = document.getElementById('sc-pos');
  if (!el) return;

  const fila = dados.fila || {};
  const guiches = dados.guiches || {};
  const itens = Object.values(fila);
  const meuItem = itens.find(f => f.numero === minhaSenha);
  if (!meuItem) return;

  if (meuItem.status === 'atendido') {
    el.className = 'pos-tag';
    el.textContent = '✅ Você foi atendido!';
    return;
  }

  const guicheChamou = Object.keys(guiches).find(g => guiches[g] === minhaSenha);
  if (guicheChamou) {
    const gNum = guicheChamou.replace('g', '');
    el.className = 'pos-tag alert';
    el.textContent = '🔔 SUA VEZ! Dirija-se ao Guichê 0' + gNum + '!';
    return;
  }

  const naFrente = itens.filter(f => f.status === 'aguardando' && f.numero < minhaSenha).length;
  el.className = 'pos-tag';
  if (naFrente === 0) {
    el.textContent = '🟢 Você é o próximo!';
  } else {
    el.textContent = '👥 ' + naFrente + ' pessoa' + (naFrente > 1 ? 's' : '') + ' na sua frente';
  }
}

window.gerarSenha = async function () {
  const btn = document.getElementById('btn-pegar');
  btn.disabled = true;
  btn.textContent = '⏳ Gerando...';

  try {
    const contRef = ref(db, '/contador');
    const snap = await get(contRef);
    const novoNum = (snap.val() || 0) + 1;
    await set(contRef, novoNum);

    const agora = new Date();
    const hora = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    const tsEmissao = Date.now();

    await push(ref(db, '/fila'), {
      numero: novoNum,
      hora,
      tsEmissao,
      status: 'aguardando',
      guiche: null,
      tsChamada: null,
      tsFim: null
    });

    minhaSenha = novoNum;
    minhaSenhaHora = hora;
    sessionStorage.setItem('minha_senha', novoNum);
    sessionStorage.setItem('minha_senha_hora', hora);

    document.getElementById('sc-num').textContent = fmt(novoNum);
    document.getElementById('sc-hora').textContent = 'Emitida às ' + hora;
    document.getElementById('senha-card').classList.add('show');
    btn.textContent = '✅ Senha retirada!';

  } catch (e) {
    btn.disabled = false;
    btn.textContent = '🎫 RETIRAR SENHA';
    alert('Erro ao gerar senha. Verifique a conexão.');
  }
}

function fmt(n) { return String(n).padStart(3, '0'); }
</script>
</body>
</html>
